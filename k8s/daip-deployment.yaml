apiVersion: v1
kind: Namespace
metadata:
  name: daip
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: daip-config
  namespace: daip
data:
  SPRING_PROFILES_ACTIVE: "docker"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
---
apiVersion: v1
kind: Secret
metadata:
  name: daip-secrets
  namespace: daip
type: Opaque
stringData:
  POSTGRES_PASSWORD: daip_secret
  JWT_SECRET: change-me-in-production-min-32-characters
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daip-backend
  namespace: daip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: daip-backend
  template:
    metadata:
      labels:
        app: daip-backend
    spec:
      containers:
        - name: backend
          image: daip-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: daip-config
            - secretRef:
                name: daip-secrets
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: daip-backend
  namespace: daip
spec:
  selector:
    app: daip-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daip-frontend
  namespace: daip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: daip-frontend
  template:
    metadata:
      labels:
        app: daip-frontend
    spec:
      containers:
        - name: frontend
          image: daip-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: daip-frontend
  namespace: daip
spec:
  selector:
    app: daip-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
