version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: daip-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daip}
      POSTGRES_USER: ${POSTGRES_USER:-daip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daip_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daip_user} -d ${POSTGRES_DB:-daip}"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: daip-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_secret}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    profiles:
      - graph

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daip-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-daip}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-daip_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-daip_secret}
      JWT_SECRET: ${JWT_SECRET:-daip-dev-secret-key-change-in-production-32chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daip-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  upload_data:
